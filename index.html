<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Das ist eine Bildergalerie">
    <title>Fotogram</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="./img/favicon.svg">
</head>

<body onload="init()">
    <header>
        <div class="header-content">
            <img class="header-img" src="./img/fotogram.svg" alt="Fotogram Logo">
        </div>
    </header>

    <main>
        <h1>Your personal photo album</h1>

        <div class="thumb-container">
            <section id="slideImages" class="thumbnails"></section>
        </div>

        <dialog id="myDialog" closedby="any" onkeydown="handleKey(event)">
            <header class="dialog-header">
                <p class="dialog-img-name" id="dialogImgName"></p>

                <button class="dialog-close" onclick="closeWithEnter()">
                    <img src="./img/close-icon.svg" alt="X-Button" onclick="closeDialog()" tabindex="0">
                </button>
            </header>

            <section class="dialog-section">
                <img class="dialog-image" id="imageDisplay">
            </section>

            <nav class="dialog-nav">
                <button class="dialog-btn" id="prevButton" onclick="imageChange(this)">
                    <img class="dialog-btn-image" src="./img/arrow-left.svg" alt="Pfeil links">
                </button>

                <p id="picNumber" class="dialog-pic-number"></p>

                <button class="dialog-btn" id="nextButton" onclick="imageChange(this)">
                    <img src="./img/arrow-right.svg" alt="Pfeil rechts">
                </button>
            </nav>
        </dialog>
    </main>

    <footer class="curved-footer">
        <img class="footer-img" src="./img/da-logo.svg" alt="DA Logo">
    </footer>

</body>

</html>
